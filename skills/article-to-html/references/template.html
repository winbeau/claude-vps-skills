<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{DOC_TITLE}}</title>
    <style>
      :root {
        --paper: #f7f7f5;
        --paper-edge: #efefea;
        --ink: #1a1a1a;
        --ink-soft: #4a4a4a;
        --ink-faint: #7a7a7a;
        --rule: #d8d8d2;
        --rule-soft: #e8e8e2;
        --accent: #6f9bb8;
        --accent-soft: #d9e6f0;
        --accent-faint: #eef4f8;
        --warn: #b88a4a;
        --warn-soft: #f5ecdc;
        --danger: #a05050;
        --code-bg: #ececea;

        /* Semantic palette for three-layer cards. Rename freely
           (e.g. --layer-a / --layer-b / --layer-c) when the three
           layers in the doc are not brain/hands/session. */
        --brain: #6f9bb8;
        --brain-bg: #eef4f8;
        --hands: #b88a4a;
        --hands-bg: #f5ecdc;
        --session: #6b7560;
        --session-bg: #ecede5;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; }

      /* Font stacks include both English serifs/monospace and CJK
         fallbacks so the same template renders cleanly for English
         or Chinese source content. */
      body {
        font-family:
          ui-serif, "Charter", "Iowan Old Style", "Source Serif Pro", Georgia,
          "Songti SC", "Source Han Serif SC", "Noto Serif CJK SC", serif;
        background: var(--paper);
        color: var(--ink);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        padding: 64px 24px 96px;
      }

      .doc { max-width: 840px; margin: 0 auto; }

      /* ─── Header ─── */
      .doc-header {
        border-bottom: 1px solid var(--rule);
        padding-bottom: 28px;
        margin-bottom: 48px;
      }
      .doc-eyebrow {
        font-family:
          ui-monospace, "SF Mono", Menlo,
          "PingFang SC", "Hiragino Sans GB", monospace;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-faint);
        margin-bottom: 14px;
      }
      .doc-title {
        font-family:
          ui-serif, Charter, Georgia,
          "Songti SC", "Source Han Serif SC", serif;
        font-size: 34px;
        font-weight: 600;
        letter-spacing: -0.01em;
        line-height: 1.2;
      }
      .doc-subtitle {
        font-size: 16px;
        color: var(--ink-soft);
        margin-top: 10px;
        font-style: italic;
      }
      .doc-meta {
        font-family:
          ui-monospace, Menlo,
          "PingFang SC", "Hiragino Sans GB", monospace;
        font-size: 11px;
        color: var(--ink-faint);
        margin-top: 18px;
        display: flex;
        gap: 24px;
      }

      /* ─── TL;DR ─── */
      .tldr {
        background: var(--accent-faint);
        border-left: 2px solid var(--accent);
        padding: 20px 24px;
        margin-bottom: 56px;
        font-size: 15px;
      }
      .tldr-label {
        font-family:
          ui-monospace, Menlo,
          "PingFang SC", "Hiragino Sans GB", monospace;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
        margin-bottom: 8px;
        font-weight: 600;
      }

      /* ─── Sections ─── */
      section { margin-bottom: 56px; }
      h2 {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.005em;
        margin-bottom: 18px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--rule);
      }
      h2 .num {
        font-family:
          ui-monospace, Menlo,
          "PingFang SC", "Hiragino Sans GB", monospace;
        font-size: 12px;
        color: var(--ink-faint);
        font-weight: 500;
        margin-right: 14px;
        letter-spacing: 0.05em;
      }
      h3 {
        font-size: 16px;
        font-weight: 600;
        margin: 28px 0 10px;
      }
      h4 {
        font-size: 14px;
        font-weight: 600;
        margin: 22px 0 8px;
      }
      p { margin-bottom: 14px; }
      p + p { margin-top: -2px; }
      a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--accent-soft); }
      a:hover { border-bottom-color: var(--accent); }
      code {
        font-family:
          ui-monospace, "SF Mono", Menlo,
          "PingFang SC", "Hiragino Sans GB", monospace;
        font-size: 13px;
        background: var(--code-bg);
        padding: 1px 5px;
        border-radius: 2px;
      }
      pre {
        font-family:
          ui-monospace, Menlo,
          "PingFang SC", "Hiragino Sans GB", monospace;
        font-size: 12.5px;
        line-height: 1.55;
        background: var(--code-bg);
        padding: 14px 18px;
        margin: 14px 0 18px;
        overflow-x: auto;
        border-left: 2px solid var(--rule);
      }
      pre code { background: transparent; padding: 0; }
      ul, ol { margin: 8px 0 16px 22px; }
      li { margin-bottom: 6px; }
      strong { font-weight: 600; }
      em { color: var(--ink-soft); }
      blockquote {
        border-left: 2px solid var(--rule);
        padding: 4px 0 4px 18px;
        margin: 14px 0 18px;
        color: var(--ink-soft);
        font-style: italic;
      }

      /* ─── Tables ─── */
      table {
        width: 100%;
        border-collapse: collapse;
        margin: 14px 0 18px;
        font-size: 14px;
      }
      th, td {
        text-align: left;
        padding: 10px 12px;
        border-bottom: 1px solid var(--rule-soft);
        vertical-align: top;
      }
      th {
        font-weight: 600;
        font-family:
          ui-sans-serif, system-ui,
          "PingFang SC", "Hiragino Sans GB", sans-serif;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--ink-faint);
        border-bottom: 1px solid var(--rule);
      }
      tbody tr:hover { background: rgba(0,0,0,0.015); }
      td.num {
        font-family:
          ui-monospace, Menlo,
          "PingFang SC", "Hiragino Sans GB", monospace;
        font-size: 13px;
      }
      td.accent { color: var(--accent); font-weight: 500; }

      /* ─── Callouts ─── */
      .callout {
        border: 1px solid var(--rule);
        background: #fff;
        padding: 16px 18px;
        margin: 16px 0 20px;
      }
      .callout.warn {
        border-color: #e6d4a8;
        background: var(--warn-soft);
      }
      .callout.cite {
        border-left: 2px solid var(--accent);
        border-top: none; border-right: none; border-bottom: none;
        background: var(--accent-faint);
        padding-left: 22px;
        font-style: italic;
      }
      .callout-label {
        font-family:
          ui-monospace, Menlo,
          "PingFang SC", "Hiragino Sans GB", monospace;
        font-size: 10.5px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--ink-faint);
        margin-bottom: 8px;
        font-weight: 600;
      }
      .callout.warn .callout-label { color: var(--warn); }
      .cite-source {
        font-style: normal;
        font-size: 12px;
        color: var(--ink-faint);
        margin-top: 10px;
        font-family:
          ui-monospace, Menlo,
          "PingFang SC", "Hiragino Sans GB", monospace;
      }

      /* ─── Figure / Diagram ─── */
      figure {
        margin: 28px 0 32px;
        border: 1px solid var(--rule);
        background: #fff;
      }
      figure svg { display: block; width: 100%; height: auto; }
      figure img { display: block; width: 100%; height: auto; }
      figcaption {
        font-family:
          ui-monospace, Menlo,
          "PingFang SC", "Hiragino Sans GB", monospace;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-faint);
        padding: 10px 16px;
        border-top: 1px solid var(--rule-soft);
        background: var(--paper-edge);
      }
      figcaption .fig-num {
        color: var(--accent);
        margin-right: 10px;
        font-weight: 600;
      }

      /* ─── N-column concept cards ─── */
      .cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 14px;
        margin: 20px 0 18px;
      }
      .cards.cols-2 { grid-template-columns: repeat(2, 1fr); }
      .cards.cols-4 { grid-template-columns: repeat(4, 1fr); }
      .card {
        border: 1px solid var(--rule);
        background: #fff;
        padding: 16px 16px 14px;
      }
      .card-icon {
        font-family:
          ui-monospace, Menlo,
          "PingFang SC", "Hiragino Sans GB", monospace;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-bottom: 8px;
        font-weight: 600;
        color: var(--accent);
      }
      .card-name {
        font-family:
          ui-serif, Charter, Georgia,
          "Songti SC", "Source Han Serif SC", serif;
        font-size: 17px;
        font-weight: 600;
        margin-bottom: 6px;
      }
      .card-where {
        font-size: 12px;
        color: var(--ink-faint);
        font-style: italic;
        margin-bottom: 10px;
      }
      .card-desc { font-size: 13px; color: var(--ink-soft); line-height: 1.5; }

      /* tone variants for cards */
      .card.tone-a .card-icon { color: var(--brain); }
      .card.tone-b .card-icon { color: var(--hands); }
      .card.tone-c .card-icon { color: var(--session); }

      /* ─── Buttons / Inputs (for interactive sections) ─── */
      .btn {
        font-family:
          ui-monospace, Menlo,
          "PingFang SC", "Hiragino Sans GB", monospace;
        font-size: 11px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        padding: 8px 14px;
        background: #fff;
        color: var(--ink);
        border: 1px solid var(--rule);
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn:hover { background: var(--paper-edge); }
      .btn.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .btn.primary:hover { background: #5a87a4; }

      input[type="text"], input[type="email"], textarea, select {
        font-family:
          ui-serif, Charter, Georgia,
          "Songti SC", "Source Han Serif SC", serif;
        font-size: 14px;
        padding: 8px 12px;
        background: #fff;
        border: 1px solid var(--rule);
        color: var(--ink);
        width: 100%;
        margin-bottom: 10px;
      }
      input:focus, textarea:focus, select:focus {
        outline: none;
        border-color: var(--accent);
      }
      label {
        font-family:
          ui-monospace, Menlo,
          "PingFang SC", "Hiragino Sans GB", monospace;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--ink-faint);
        display: block;
        margin-bottom: 4px;
      }

      /* ─── Footer ─── */
      footer {
        margin-top: 80px;
        padding-top: 24px;
        border-top: 1px solid var(--rule);
        font-size: 12px;
        color: var(--ink-faint);
      }
      footer h4 {
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-family:
          ui-monospace, Menlo,
          "PingFang SC", "Hiragino Sans GB", monospace;
        margin-bottom: 10px;
        color: var(--ink-soft);
      }
      footer ul { list-style: none; margin-left: 0; }
      footer li { margin-bottom: 4px; }

      .mascot {
        display: inline-block;
        width: 8px;
        height: 8px;
        background: var(--accent);
        margin-right: 8px;
        vertical-align: middle;
      }

      @media (max-width: 720px) {
        body { padding: 32px 16px 64px; }
        .doc-title { font-size: 26px; }
        .cards, .cards.cols-2, .cards.cols-4 { grid-template-columns: 1fr; }
        .doc-meta { flex-wrap: wrap; gap: 12px; }
      }
    </style>
  </head>
  <body>
    <article class="doc">

      <!-- ────── Header ────── -->
      <header class="doc-header">
        <div class="doc-eyebrow"><span class="mascot"></span>{{EYEBROW}}</div>
        <h1 class="doc-title">{{DOC_TITLE}}</h1>
        <p class="doc-subtitle">{{DOC_SUBTITLE}}</p>
        <div class="doc-meta">
          <span>STATUS · {{STATUS}}</span>
          <span>DATE · {{DATE}}</span>
          <span>AUTHOR · {{AUTHOR}}</span>
        </div>
      </header>

      <!-- ────── TL;DR ────── -->
      <div class="tldr">
        <div class="tldr-label">TL;DR</div>
        {{TLDR_BODY}}
      </div>

      <!-- ────── Sections ────── -->
      <section>
        <h2><span class="num">01</span>{{SECTION_1_TITLE}}</h2>
        <p>{{SECTION_1_BODY}}</p>
      </section>

      <!-- ────── Footer ────── -->
      <footer>
        <h4>References</h4>
        <ul>
          <li>{{REFERENCE_1}}</li>
        </ul>
      </footer>

    </article>
  </body>
</html>
